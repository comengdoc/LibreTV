# 文件：.github/workflows/build-and-push.yml
name: Build & Push LibreTV Docker Image

# 一）触发条件
on:
  # 1. 每次 push 到 main 分支就自动执行
  push:
    branches:
      - main
  # 2. 支持在 Actions 页面点击 “Run workflow” 手动触发
  workflow_dispatch:
  # 3. （可选）每天 UTC 0 点自动执行一次
  schedule:
    - cron: "0 0 * * *"

# 二）权限，给 GITHUB_TOKEN 读写仓库的权限
permissions:
  contents: read
  actions: read
  packages: write   # 如果要推到 GitHub Container Registry

# 三）定义 job
jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest     # 选择 Ubuntu 最新虚拟机

    steps:
      # 3.1 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 如果想完整拿 submodule 或带 lfs，可开启以下
          # submodules: recursive
          # fetch-depth: 0

      # 3.2 读版本号
      - name: Read version
        id: read-version
        run: |
          VERSION=$(cat VERSION.txt)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      # 3.3 安装 QEMU 多架构支持
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      # 3.4 安装 Buildx（Docker 增强构建器）
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true      # 确保 buildx 在最新可用版本

      # 3.5 登录 Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3.6 构建并推送镜像
      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .                      # 构建上下文
          file: Dockerfile               # Dockerfile 路径
          push: true                      # 构建完成后推到 Registry
          platforms: linux/amd64,linux/arm64/v8   # 支持的架构
          tags: |
            YOURNAME/libretv:latest
            YOURNAME/libretv:${{ steps.read-version.outputs.VERSION }}

      # 3.7 （可选）构建完成后的输出或通知
      - name: Notify Slack (optional)
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
